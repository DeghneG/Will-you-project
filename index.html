<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Will You...?</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating hearts layer -->
    <div id="hearts-bg-container"></div>

    <!-- Main card -->
    <div class="card" id="main-card">

        <!-- Recipient name -->
        <p class="label-name">For: <span class="label-name-value">Name</span></p>
        <p class="label-name">From: <span class="label-name-value">Name</span></p>

        <hr class="divider">

        <!-- Date details -->
        <div class="details">
            <div class="detail-row">
                <span class="detail-icon">🌹</span>
                <div>
                    <span class="detail-label">What</span>
                    <span class="detail-value">Default</span>
                </div>
            </div>
            <div class="detail-row">
                <span class="detail-icon">📍</span>
                <div>
                    <span class="detail-label">Where</span>
                    <span class="detail-value">Default</span>
                </div>
            </div>
            <div class="detail-row">
                <span class="detail-icon">🕯️</span>
                <div>
                    <span class="detail-label">When</span>
                    <span class="detail-value">Default</span>
                </div>
            </div>
        </div>

        <hr class="divider">

        <!-- The big question -->
        <h1 class="question">Will you go on a date with me? 🌷</h1>

        <!-- Buttons -->
        <div class="button-group">
            <button id="yes-btn" class="btn yes-btn">Yes! 💕</button>
            <button id="no-btn" class="btn no-btn">No</button>
        </div>
    </div>

    <!-- Success screen -->
    <div class="card success-card hidden" id="success-card">
        <h1 class="success-text">Yay! See You!</h1>
        <p class="success-sub">Time: @Location</p>
    </div>

    <!-- The No button lives here so it can roam freely -->
    <button id="no-btn-float" class="btn no-btn hidden">No</button>

    <script src="script.js"></script>
</body>
</html>
